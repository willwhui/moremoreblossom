<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>More More Blossom</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="game-container"></div>

  <!-- Shown while the phoenix GLB is streaming; hidden once loaded -->
  <div id="loading">
    <div id="loading-inner">
      <div id="loading-spinner"></div>
      <p>Summoning the Phoenix…</p>
    </div>
  </div>

  <div id="ui-layer">
    <div id="hud">
      <div class="feathers-count">🪶 0</div>
    </div>
    <!-- CC-BY-4.0 attribution — required by the model license -->
    <div id="attribution">
      <a href="https://skfb.ly/pDxVB" target="_blank" rel="noopener">&ldquo;Phoenix bird&rdquo;</a>
      by <a href="https://sketchfab.com/norberto3d" target="_blank" rel="noopener">Dream Dixie Works</a>
      &mdash; <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    </div>
    <div id="joystick-left-zone"></div>
    <div id="joystick-right-zone"></div>
    <button id="btn-action" aria-label="Jump or Takeoff">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
